name: AbroadNews Automation

on:
  push:
    branches:
      - main
  schedule:
    # This triggers the script every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  run-automation:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Important: Allows the bot to save news files back to GitHub

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Manual install in case requirements.txt is missing:
          pip install google-generativeai requests beautifulsoup4

      - name: Execute News Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python your_script_name.py 
        # REPLACE 'update_news.py' with your actual file name (e.g., main.py)

      - name: Commit and Push Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Auto-update: Latest news processed" || echo "No changes to commit"
          git push
