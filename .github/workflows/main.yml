name: AbroadNews

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      # actions/checkout@v4 ki asli SHA ID
      uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

    - name: Set up Python
      # actions/setup-python@v5 ki asli SHA ID
      uses: actions/setup-python@f67e2448e993c57446f9b1b606553098651c60da
      with:
        python-version: '3.10'

    - name: Install New SDK and Deps
      run: |
        python -m pip install --upgrade pip
        pip install requests google-genai

    - name: Run News Script
      env:
        NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python update_news.py

    - name: Commit and Push Everything
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add index.html
        git commit -m "Latest AI News Updated: $(date)" || echo "No changes to commit"
        git push origin main
        
